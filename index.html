    <style>
        :root {
            --primary: #0a192f;        /* Deep Corporate Telecom Navy */
            --secondary: #172a45;      /* Slate Infrastructure Layer */
            --accent: #00f2fe;         /* Fiber Optic Cyan */
            --accent-dark: #00b4d8;    /* Deep Connectivity Blue-Green */
            --text: #ffffff;
            --muted: #94a3b8;          /* Refined Slate Gray for Body Typography */
            --card: #112240;           /* Clean Panel Container Background */
            --border: #233554;         /* High-End Enterprise Borders */
            --success: #10b981;
            --warning: #facc15;
            --shadow: 0 15px 40px rgba(0,0,0,.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--primary);
            color: var(--text);
            line-height: 1.8;
            overflow-x: hidden;
        }

        img {
            max-width: 100%;
            display: block;
        }

        a {
            text-decoration: none;
            transition: .3s ease;
        }

        ul {
            list-style: none;
        }

        .container {
            width: min(1400px, 92%);
            margin: auto;
        }

        section {
            padding: 120px 0;
            border-bottom: 1px solid rgba(35, 53, 84, 0.4);
        }

        .section-title {
            text-align: center;
            margin-bottom: 80px;
        }

        .section-title h2 {
            font-size: 2.8rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .section-title h2 span {
            color: transparent;
            background: linear-gradient(135deg, var(--accent), #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .section-title p {
            color: var(--muted);
            max-width: 750px;
            margin: auto;
            font-size: 1.1rem;
        }

        /* NAVIGATION HEADER */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 999;
            background: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .logo-box {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: var(--primary);
            font-weight: 900;
            padding: 8px 12px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .menu {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .menu a {
            color: var(--muted);
            font-size: .95rem;
            font-weight: 600;
        }

        .menu a:hover {
            color: var(--accent);
        }

        .cv-btn {
            padding: 12px 24px;
            border: 2px solid var(--accent);
            border-radius: 12px;
            font-size: .85rem;
            font-weight: 700;
            color: var(--accent);
            background: transparent;
        }

        .cv-btn:hover {
            background: rgba(0, 242, 254, 0.1);
            color: white;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        .menu-toggle {
            display: none;
            font-size: 28px;
            color: var(--accent);
            cursor: pointer;
        }

        @media(max-width:1024px){
            .menu {
                display: none;
                position: absolute;
                top: 85px;
                right: 20px;
                background: var(--card);
                flex-direction: column;
                padding: 30px;
                border-radius: 16px;
                width: 280px;
                box-shadow: var(--shadow);
                border: 1px solid var(--border);
                gap: 20px;
                align-items: flex-start;
            }

            .menu.show {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }
        }

        /* HERO AREA */
        .hero {
            padding-top: 200px;
            padding-bottom: 140px;
            background:
                radial-gradient(circle at top right, rgba(0, 242, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at bottom left, rgba(79, 172, 254, 0.1) 0%, transparent 35%),
                var(--primary);
            position: relative;
            overflow: hidden;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1.4fr .8fr;
            align-items: center;
            gap: 60px;
        }

        @media(max-width:1100px){
            .hero-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }
        }

        .availability {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 999px;
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid rgba(0, 242, 254, 0.25);
            color: var(--accent);
            font-size: .85rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .hero h1 {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .hero h1 span {
            color: transparent;
            background: linear-gradient(135deg, var(--accent), #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .hero-role {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0, 242, 254, 0.15);
            color: var(--accent);
            border: 1px solid rgba(0, 242, 254, 0.3);
            font-weight: 800;
            font-size: .9rem;
            text-transform: uppercase;
            border-radius: 10px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text);
            font-weight: 600;
            margin-bottom: 25px;
        }

        .hero-description {
            font-size: 1.1rem;
            color: var(--muted);
            max-width: 850px;
            margin-bottom: 40px;
        }

        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        @media(max-width:1100px){
            .hero-buttons {
                justify-content: center;
            }
        }

        .btn {
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: var(--primary);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 25px rgba(0, 242, 254, 0.45);
        }

        .btn-secondary {
            border: 2px solid var(--border);
            color: white;
            background: transparent;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-4px);
        }

        /* Profile Component */
        .profile-wrapper {
            display: flex;
            justify-content: center;
            padding: 40px 20px; 
        }

        .profile-ring {
            width: 320px; 
            height: 320px;
