<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jamal Fahadh Mohamed | Pearson Edexcel ICT Teacher | Digital Skills Trainer | Web Design Instructor</title>
<meta name="description" content="Professional ICT Teacher, Digital Skills Trainer and Web Design Instructor in Hargeisa Somaliland. Specializing in Pearson Edexcel ICT, Microsoft Office, Educational Technology and Computer Lab Management." />
<meta name="keywords" content="ICT Teacher Hargeisa, Pearson Edexcel ICT, Digital Skills Trainer Somaliland, Web Design Instructor, Computer Studies Teacher, ICT Trainer Somalia" />
<meta name="author" content="Jamal Fahadh Mohamed" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{--bg:#0b1220;--bg2:#0f172a;--surface:rgba(255,255,255,.08);--surface2:rgba(255,255,255,.06);--line:rgba(255,255,255,.12);--text:#e5eefc;--muted:#a8b3c7;--brand:#5dd6ff;--brand2:#7c8cff;--accent:#22c55e;--shadow:0 20px 60px rgba(0,0,0,.28);--radius:24px;}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:'Inter',sans-serif;background:radial-gradient(circle at top,#14213d 0,#0b1220 38%,#08101c 100%);color:var(--text);line-height:1.7;overflow-x:hidden}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
ul{margin:0;padding:0;list-style:none}
.container{width:min(1180px,92vw);margin:auto}
.skip-link{position:absolute;left:-999px;top:auto;width:1px;height:1px;overflow:hidden}
.skip-link:focus{left:16px;top:16px;width:auto;height:auto;padding:10px 14px;background:#fff;color:#000;border-radius:10px;z-index:10000}
header{position:sticky;top:0;z-index:9999;background:rgba(6,10,20,.78);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:14px 0}
.brand{display:flex;align-items:center;gap:12px;font-weight:800;letter-spacing:.2px;min-width:max-content}
.brand-mark{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--brand2));box-shadow:0 10px 30px rgba(93,214,255,.25)}
.brand span{font-size:1rem;font-family:'Sora',sans-serif}
.menu-toggle{display:none;background:transparent;border:1px solid var(--line);color:var(--text);border-radius:14px;padding:10px 14px;font-size:1rem}
.menu-toggle:focus,.nav a:focus,.btn:focus,.doc-card:focus,.contact-link:focus{outline:2px solid var(--brand);outline-offset:3px}
.menu-wrap{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}
.menu{display:flex;gap:8px;align-items:center}
.menu a{display:inline-flex;padding:10px 14px;border-radius:999px;color:var(--muted);font-weight:600;font-size:.95rem;transition:.25s}
.menu a:hover,.menu a:focus{background:var(--surface);color:#fff;outline:none}
.header-actions{display:flex;gap:10px;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:12px 18px;border-radius:16px;font-weight:800;transition:.25s;border:1px solid transparent;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#07101c;box-shadow:0 15px 35px rgba(93,214,255,.18)}
.btn-secondary{background:rgba(255,255,255,.04);border-color:var(--line);color:#fff}
.btn:hover{transform:translateY(-2px)}
.hero{position:relative;overflow:hidden;padding:72px 0 36px}
.hero::before{content:'';position:absolute;inset:-120px -20% auto auto;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(93,214,255,.22),rgba(93,214,255,0) 68%);pointer-events:none}
.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:34px;align-items:center}
.eyebrow{display:inline-flex;align-items:center;gap:10px;padding:10px 16px;border:1px solid rgba(93,214,255,.25);background:rgba(93,214,255,.08);color:#dff6ff;border-radius:999px;font-weight:700;font-size:.92rem}
h1,h2,h3,h4{font-family:'Sora',sans-serif}
.hero h1{font-size:clamp(2.6rem,5vw,4.9rem);line-height:1.02;margin:18px 0 14px;letter-spacing:-.04em}
.hero h2{font-size:clamp(1rem,1.8vw,1.3rem);font-weight:600;color:#d4dded;margin:0 0 18px;max-width:58ch}
.hero p{color:var(--muted);max-width:62ch;font-size:1.02rem}
.hero-actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:28px}
.hero-meta{margin-top:18px;display:flex;flex-wrap:wrap;gap:10px}
.pill{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--line);color:#d5deee;font-size:.92rem}
.hero-card{background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.06));border:1px solid var(--line);border-radius:30px;padding:24px;box-shadow:var(--shadow)}
.profile-wrap{position:relative;width:min(330px,80vw);aspect-ratio:1/1;margin:auto;border-radius:32px;padding:10px;background:linear-gradient(135deg,rgba(93,214,255,.35),rgba(124,140,255,.18));box-shadow:0 20px 50px rgba(0,0,0,.25)}
.profile-img{width:100%;height:100%;object-fit:cover;border-radius:24px;border:1px solid rgba(255,255,255,.2)}
.mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px}
.mini{padding:16px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid var(--line)}
.mini strong{display:block;font-size:1.2rem}
.mini span{color:var(--muted);font-size:.92rem}
.section{padding:48px 0}
.section-title{margin-bottom:22px}
.section-title h2{font-size:clamp(1.7rem,3vw,2.6rem);margin:0 0 8px;letter-spacing:-.03em}
.section-title p{margin:0;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px}
.card{background:linear-gradient(180deg,rgba(255,255,255,.085),rgba(255,255,255,.05));border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.card h3{margin:0 0 12px;font-size:1.2rem}
.card p,.card li{color:#d1daeb}
.skill-chip{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(93,214,255,.08);border:1px solid rgba(93,214,255,.16);margin:0 8px 8px 0;color:#e9fbff;font-weight:600;font-size:.92rem}
.list{padding-left:20px;list-style:disc}
.list li{margin:10px 0}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px}
.stat{padding:22px;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.05));border:1px solid var(--line);text-align:center}
.stat strong{display:block;font-size:2.2rem;line-height:1;color:#fff}
.stat span{color:var(--muted)}
.experience-item{position:relative;overflow:hidden}
.experience-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--brand),var(--brand2))}
.experience-top{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;align-items:flex-start;margin-bottom:10px}
.experience-title{margin:0;font-size:1.18rem}
.experience-meta{color:var(--muted);font-weight:600}
.experience-bullets{padding-left:20px;list-style:disc}
.experience-bullets li{margin:10px 0;color:#d7e2f3}
.project-img{width:100%;height:220px;object-fit:cover;border-radius:18px;margin-bottom:16px;border:1px solid var(--line)}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.doc-card{display:block;text-align:center;padding:22px;border-radius:20px;background:rgba(255,255,255,.06);border:1px solid var(--line);transition:.25s}
.doc-card:hover{transform:translateY(-4px)}
.doc-card h4{margin:10px 0 6px}
.doc-card p{margin:0 0 12px;color:var(--muted)}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
.contact-link{display:block;padding:14px 16px;border-radius:16px;font-weight:800;text-align:center}
.wa{background:#25D366;color:#08110f}
.call{background:#0a76ff;color:#fff}
.mail{background:#101827;color:#fff;border:1px solid var(--line)}
footer{padding:34px 0 42px;text-align:center;color:var(--muted)}
.floating-wa{position:fixed;right:18px;bottom:18px;z-index:999;background:#25D366;color:#fff;padding:14px 18px;border-radius:999px;font-weight:800;box-shadow:0 16px 35px rgba(0,0,0,.26)}
@media(max-width:1100px){.menu-wrap{gap:8px}.header-actions{display:none}}
@media(max-width:980px){.hero-grid{grid-template-columns:1fr}.menu-toggle{display:inline-flex}.menu{display:none;position:absolute;right:0;top:66px;flex-direction:column;align-items:stretch;padding:12px;background:#09111f;border:1px solid var(--line);border-radius:18px;min-width:240px}.menu.show{display:flex}.menu a{padding:12px 14px}.menu-wrap{position:relative}}
@media(max-width:640px){.hero{padding-top:44px}.hero-actions,.hero-meta{justify-content:flex-start}.mini-grid{grid-template-columns:1fr}.floating-wa{right:12px;bottom:12px}.brand span{font-size:.95rem}}
</style>
</head>
